<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login | RPV Industrial Supply</title>
  <meta name="description" content="เข้าสู่ระบบจัดการสินค้า RPV Industrial Supply">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
  <main class="login-card">
    <a class="logo" href="/">RPV</a>
    <h1 style="margin:18px 0 10px;color:var(--green-deep);font-size:2rem;line-height:1.1">Admin Login</h1>
    <p class="muted" style="margin:0 0 20px">เข้าสู่ระบบเพื่อจัดการสินค้าและข้อมูลเว็บ</p>

    <form id="loginForm" class="form-grid">
      <div class="form-row">
        <label for="username">Username</label>
        <input class="input" id="username" type="text" autocomplete="username" placeholder="admin" required>
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input class="input" id="password" type="password" autocomplete="current-password" placeholder="password" required>
      </div>
      <button class="btn btn-primary" type="submit">เข้าสู่ระบบ</button>
      <p class="error" id="error"></p>
    </form>
  </main>

  <script src="/login.js"></script>
</body>
</html>
